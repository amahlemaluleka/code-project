<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Insertion Sort - Log2Base2 Style</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to bottom, #001464, #0096FF);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 15px;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .title {
      background: #FFC107;
      color: #000;
      display: inline-block;
      padding: 8px 30px;
      font-size: 28px;
      font-weight: bold;
      border-radius: 4px;
    }
    #info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 600px;
      margin: 10px 0;
      font-size: 20px;
      font-weight: bold;
    }
    #timer { font-size: 24px; color: #FFDC00; }
    #timer.warning { color: #FF4444; animation: pulse 0.5s infinite; }
    #score { color: #00FF00; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    
    #controls {
      margin: 15px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 10px 18px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      background: #FFDC00;
      color: #000;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: #FFC300; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    #game-area {
      position: relative;
      width: 700px;
      height: 400px;
    }
    .card {
      width: 85px;
      height: 125px;
      background: #FAFAFA;
      border: 3px solid #000;
      border-radius: 10px;
      position: absolute;
      transition: all 0.5s ease;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
    }
    .card.glow {
      box-shadow: 0 0 20px #00FFFF, 3px 3px 10px rgba(0,0,0,0.5);
      border-color: #00AAFF;
    }
    .card.comparing {
      border-color: #0066FF;
      transform: translateY(-20px) scale(1.05);
    }
    .card.sorted {
      border-color: #00FF00;
    }
    .card .value {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 26px;
      font-weight: bold;
      color: #000;
    }
    .card .value-bottom {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 26px;
      font-weight: bold;
      color: #000;
      transform: rotate(180deg);
    }
    .card .suit {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 38px;
      color: #C80000;
    }
    #hand {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 80px;
    }
    .hand-base {
      width: 50px;
      height: 70px;
      background: #FFB86C;
      border-radius: 25px 25px 8px 8px;
      margin: 0 auto;
    }
    #comparison {
      position: absolute;
      top: 60px;
      right: 30px;
      background: white;
      color: black;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 20px;
      font-weight: bold;
      display: none;
    }
    #instruction {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
      min-height: 30px;
      text-align: center;
    }
    #win-msg {
      margin-top: 10px;
      font-size: 24px;
      color: #00FF00;
      font-weight: bold;
      display: none;
      text-shadow: 2px 2px 4px #000;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Log2Base2®</div>
    <div class="title">Insertion Sort</div>
  </div>

  <div id="info-bar">
    <div>Score: <span id="score">0</span></div>
    <div id="timer">Time: 20s</div>
    <div>Step: <span id="step">0</span>/7</div>
  </div>

  <div id="controls">
    <button id="startBtn">Start</button>
    <button id="nextBtn" disabled>Next Step</button>
    <button id="stopBtn" disabled>Stop</button>
    <button id="autoBtn" disabled>Auto Play</button>
    <button id="resetBtn">Reset</button>
    <button id="musicBtn">Music: Off</button>
  </div>

  <div id="game-area">
    <div id="comparison"></div>
    <div id="hand"><div class="hand-base"></div></div>
  </div>

  <div id="instruction">Press Start. You have 20s per step!</div>
  <div id="win-msg"></div>

  <audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

<script>
// Sound effects using Web Audio API
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if (type === 'correct') {
    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
    osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
    osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  } else if (type === 'timeout') {
    osc.type = 'square';
    osc.frequency.value = 150;
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
  } else if (type === 'win') {
    [523,659,784,1047].forEach((f,i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = f;
      g.gain.setValueAtTime(0.2, audioCtx.currentTime + i*0.1);
      g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.1 + 0.3);
      o.start(audioCtx.currentTime + i*0.1);
      o.stop(audioCtx.currentTime + i*0.1 + 0.3);
    });
  }
}

class InsertionSortGame {
  constructor() {
    this.originalArray = [70, 10, 40, 80, 50, 30, 60, 20]; // 8 cards
    this.array = [...this.originalArray];
    this.cards = [];
    this.i = 1;
    this.j = 0;
    this.key = null;
    this.keyCard = null;
    this.phase = 'pick';
    this.running = false;
    this.autoPlay = false;
    this.musicOn = false;
    this.score = 0;
    this.timeLimit = 20;
    this.timeLeft = this.timeLimit;
    this.timerId = null;
    this.stepCount = 0;
    
    this.gameArea = document.getElementById('game-area');
    this.comparison = document.getElementById('comparison');
    this.instruction = document.getElementById('instruction');
    this.timerEl = document.getElementById('timer');
    this.scoreEl = document.getElementById('score');
    this.stepEl = document.getElementById('step');
    this.winMsg = document.getElementById('win-msg');
    this.music = document.getElementById('bgMusic');
    
    document.getElementById('startBtn').onclick = () => this.start();
    document.getElementById('nextBtn').onclick = () => this.step();
    document.getElementById('stopBtn').onclick = () => this.stop();
    document.getElementById('autoBtn').onclick = () => this.toggleAuto();
    document.getElementById('resetBtn').onclick = () => this.reset();
    document.getElementById('musicBtn').onclick = () => this.toggleMusic();
    
    this.initCards();
    this.updatePositions();
  }
  
  initCards() {
    this.gameArea.querySelectorAll('.card').forEach(c => c.remove());
    this.cards = [];
    this.array.forEach((val, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      if (idx === 0) card.classList.add('sorted');
      card.innerHTML = `
        <div class="value">${val}</div>
        <div class="suit">♣</div>
        <div class="value-bottom">${val}</div>
      `;
      this.gameArea.appendChild(card);
      this.cards.push({ el: card, value: val });
    });
  }
  
  updatePositions() {
    const baseX = 350;
    const baseY = 200;
    const offset = 22;
    
    this.cards.forEach((card, idx) => {
      if (card === this.keyCard) {
        card.el.style.left = (baseX + 50) + 'px';
        card.el.style.top = '40px';
        card.el.style.zIndex = 100;
      } else {
        card.el.style.left = (baseX + idx * offset) + 'px';
        card.el.style.top = baseY + 'px';
        card.el.style.zIndex = idx;
        card.el.classList.remove('glow', 'comparing');
      }
      if (idx < this.i) card.el.classList.add('sorted');
    });
  }
  
  start() {
    if (this.running) return;
    this.running = true;
    this.winMsg.style.display = 'none';
    document.getElementById('startBtn').disabled = true;
    document.getElementById('nextBtn').disabled = false;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('autoBtn').disabled = false;
    this.instruction.textContent = 'Click "Next Step" to sort. 20s per step!';
    this.startTimer();
  }
  
  startTimer() {
    clearInterval(this.timerId);
    this.timeLeft = this.timeLimit;
    this.timerId = setInterval(() => {
      if (!this.running) return;
      this.timeLeft--;
      this.timerEl.textContent = `Time: ${this.timeLeft}s`;
      
      if (this.timeLeft <= 5) {
        this.timerEl.classList.add('warning');
      } else {
        this.timerEl.classList.remove('warning');
      }
      
      if (this.timeLeft <= 0) {
        playSound('timeout');
        this.instruction.textContent = 'Time up! Moving to next step...';
        clearInterval(this.timerId);
        setTimeout(() => this.step(), 1000);
      }
    }, 1000);
  }
  
  step() {
    if (!this.running) return;
    if (this.i >= this.array.length) {
      this.complete();
      return;
    }
    
    clearInterval(this.timerId);
    this.stepCount++;
    this.stepEl.textContent = this.stepCount;
    
    if (this.phase === 'pick') {
      this.key = this.array[this.i];
      this.keyCard = this.cards[this.i];
      this.j = this.i - 1;
      this.keyCard.el.classList.add('glow');
      this.instruction.textContent = `Pick card ${this.key} from unsorted part`;
      this.phase = 'compare';
      this.updatePositions();
      
    } else if (this.phase === 'compare') {
      if (this.j >= 0 && this.array[this.j] > this.key) {
        this.comparison.style.display = 'block';
        this.comparison.textContent = `${this.key} < ${this.array[this.j]}`;
        this.cards[this.j].el.classList.add('comparing');
        this.instruction.textContent = `Compare: ${this.key} < ${this.array[this.j]}? Yes, shift right`;
        
        this.array[this.j + 1] = this.array[this.j];
        const temp = this.cards[this.j + 1];
        this.cards[this.j + 1] = this.cards[this.j];
        this.cards[this.j] = temp;
        this.j--;
        this.updatePositions();
        
      } else {
        this.phase = 'insert';
        this.comparison.style.display = 'none';
        this.step();
      }
      
    } else if (this.phase === 'insert') {
      this.array[this.j + 1] = this.key;
      this.keyCard.el.classList.remove('glow');
      this.cards.forEach(c => c.el.classList.remove('comparing'));
      this.instruction.textContent = `Insert ${this.key} at position ${this.j + 1}`;
      playSound('correct');
      this.score += Math.max(5, this.timeLeft);
      this.scoreEl.textContent = this.score;
      this.keyCard = null;
      this.i++;
      this.phase = 'pick';
      this.updatePositions();
      this.startTimer();
    }
  }
  
  complete() {
    this.running = false;
    clearInterval(this.timerId);
    playSound('win');
    this.winMsg.style.display = 'block';
    this.winMsg.textContent = `Sorted! Final Score: ${this.score}`;
    this.instruction.textContent = 'Array is sorted! Press Reset for new cards';
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('autoBtn').disabled = true;
  }
  
  toggleAuto() {
    this.autoPlay = !this.autoPlay;
    document.getElementById('autoBtn').textContent = this.autoPlay ? 'Pause' : 'Auto Play';
    if (this.autoPlay) this.autoStep();
  }
  
  autoStep() {
    if (!this.autoPlay || !this.running || this.i >= this.array.length) {
      this.autoPlay = false;
      document.getElementById('autoBtn').textContent = 'Auto Play';
      return;
    }
    this.step();
    setTimeout(() => this.autoStep(), 1200);
  }
  
  stop() {
    this.running = false;
    clearInterval(this.timerId);
    this.autoPlay = false;
    document.getElementById('startBtn').disabled = false;
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('autoBtn').disabled = true;
    document.getElementById('autoBtn').textContent = 'Auto Play';
    this.instruction.textContent = 'Paused. Press Start to continue.';
  }
  
  reset() {
    this.stop();
    this.array = [...this.originalArray];
    this.i = 1;
    this.j = 0;
    this.key = null;
    this.keyCard = null;
    this.phase = 'pick';
    this.score = 0;
    this.timeLeft = this.timeLimit;
    this.stepCount = 0;
    this.scoreEl.textContent = '0';
    this.stepEl.textContent = '0';
    this.timerEl.textContent = 'Time: 20s';
    this.timerEl.classList.remove('warning');
    this.comparison.style.display = 'none';
    this.winMsg.style.display = 'none';
    this.instruction.textContent = 'Press Start. You have 20s per step!';
    this.initCards();
    this.updatePositions();
  }
  
  toggleMusic() {
    this.musicOn = !this.musicOn;
    document.getElementById('musicBtn').textContent = `Music: ${this.musicOn ? 'On' : 'Off'}`;
    if (this.musicOn) {
      this.music.play().catch(() => {});
    } else {
      this.music.pause();
    }
  }
}

const game = new InsertionSortGame();
</script>
</body>
</html>
